    <script>
        let cube = document.getElementById('cube');
        let lon = 0, lat = 0, startX, startY, startLon, startLat, isMousedown = false;

        // Определяем, открыт ли сайт с мобильного телефона
        const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

        function updateRotation() {
            lat = Math.max(-85, Math.min(85, lat));
            cube.style.transform = `rotateX(${lat}deg) rotateY(${lon}deg)`;
        }

        window.addEventListener('pointerdown', (e) => {
            isMousedown = true; 
            startX = e.clientX; 
            startY = e.clientY;
            startLon = lon; 
            startLat = lat;
        });

        window.addEventListener('pointermove', (e) => {
            if (!isMousedown) return;
            
            // Разделяем управление для ПК и мобильного из-за вывернутого куба
            if (isMobile) {
                // Корректные оси и направления для сенсорного экрана смартфона
                lon = startLon - (e.clientX - startX) * 0.15;
                lat = startLat + (e.clientY - startY) * 0.15;
            } else {
                // Проверенное рабочее направление для мышки на компьютере
                lon = startLon + (e.clientX - startX) * 0.15;
                lat = startLat - (e.clientY - startY) * 0.15;
            }
            
            updateRotation();
        });

        window.addEventListener('pointerup', () => isMousedown = false);
        updateRotation();
    </script>
