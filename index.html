<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>3D Панорама</title>
    <style>
        html, body { width: 100%; height: 100%; margin: 0; padding: 0; overflow: hidden; background-color: #000; }
        
        /* Главная сцена */
        #stage { 
            width: 100%; height: 100%; 
            perspective: 400px; -webkit-perspective: 400px; 
            position: relative; overflow: hidden; 
        }
        
        /* Внешний контейнер (вращается только влево-вправо по оси Y, удерживая горизонт ровным) */
        #rotator-y {
            position: absolute; width: 0; height: 0; top: 50%; left: 50%;
            transform-style: preserve-3d; -webkit-transform-style: preserve-3d;
        }

        /* Внутренний контейнер (вращается только вверх-вниз по оси X) */
        #cube {
            position: absolute; width: 0; height: 0;
            transform-style: preserve-3d; -webkit-transform-style: preserve-3d;
        }
        
        .face {
            position: absolute; 
            width: 1024px; height: 1024px;
            top: -512px; left: -512px;
            background-size: 100% 100%; background-position: center;
            background-repeat: no-repeat;
            backface-visibility: visible; -webkit-backface-visibility: visible;
        }
        
        /* Выворачиваем грани картинками внутрь */
        .f-front  { transform: rotateY(180deg) translateZ(-512px) scaleX(-1); background-image: url('+Z.png'); }
        .f-back   { transform: rotateY(  0deg) translateZ(-512px) scaleX(-1); background-image: url('-Z.png'); }
        .f-right  { transform: rotateY( -90deg) translateZ(-512px) scaleX(-1); background-image: url('+X.png'); }
        .f-left   { transform: rotateY(  90deg) translateZ(-512px) scaleX(-1); background-image: url('-X.png'); }
        .f-top    { transform: rotateX(  90deg) translateZ(-512px) scaleY(-1); background-image: url('+Y.png'); }
        .f-bottom { transform: rotateX( -90deg) translateZ(-512px) scaleY(-1); background-image: url('-Y.png'); }
    </style>
</head>
<body>
    <div id="stage">
        <div id="rotator-y">
            <div id="cube">
                <div class="face f-front"></div>
                <div class="face f-back"></div>
                <div class="face f-right"></div>
                <div class="face f-left"></div>
                <div class="face f-top"></div>
                <div class="face f-bottom"></div>
            </div>
        </div>
    </div>
    <script>
        let rotY = document.getElementById('rotator-y');
        let cube = document.getElementById('cube');
        let lon = 0, lat = 0, startX, startY, startLon, startLat, isMousedown = false;

        function updateRotation() {
            lat = Math.max(-85, Math.min(85, lat));
            
            // Разделяем вращение: один слой крутит по горизонтали, второй — по вертикали. Завал исчезает!
            rotY.style.transform = `rotateY(${-lon}deg)`;
            cube.style.transform = `rotateX(${-lat}deg)`;
        }

        window.addEventListener('pointerdown', (e) => {
            isMousedown = true; 
            startX = e.clientX; 
            startY = e.clientY;
            startLon = lon; 
            startLat = lat;
        });

        window.addEventListener('pointermove', (e) => {
            if (!isMousedown) return;
            
            lon = startLon + (e.clientX - startX) * 0.15;
            lat = startLat + (e.clientY - startY) * 0.15;
            
            updateRotation();
        });

        window.addEventListener('pointerup', () => isMousedown = false);
        updateRotation();
    </script>
</body>
</html>
