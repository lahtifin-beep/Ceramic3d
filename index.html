<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>3D Панорама</title>
    <style>
        html, body { width: 100%; height: 100%; margin: 0; padding: 0; overflow: hidden; background-color: #000; }
        #canvas { width: 100%; height: 100%; position: absolute; top: 0; left: 0; }
    </style>
    <!-- Официальный плеер Ceramic 3D из облака -->
    <script src="https://ceramic3d.ru"></script>
</head>
<body>
    <div id="canvas"></div>
    <script>
        // Запуск панорамы с использованием внешнего скрипта
        if (typeof initPanorama === 'function') {
            initPanorama("canvas", "camera.xml");
        } else if (typeof Ceramic3D !== 'undefined' && Ceramic3D.Panorama) {
            new Ceramic3D.Panorama("canvas", "camera.xml");
        } else {
            document.body.innerHTML = "<div style='color:white;text-align:center;padding:20px;'>Ошибка загрузки плеера панорамы.</div>";
        }
    </script>
</body>
</html>
